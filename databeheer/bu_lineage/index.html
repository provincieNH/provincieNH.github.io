<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>BU Data Lineage</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />

  <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
</head>

<body>

<header id="header">
  <h1>BU Data Lineage</h1>
  <h2>Overzicht van datasets en herkomst</h2>
</header>

<div id="filters">
  <button data-filter="dataset">Datasets</button>
  <button data-filter="job">Jobs</button>
  <button data-medal="goud">Goud</button>
  <button data-medal="zilver">Zilver</button>
  <button data-medal="brons">Brons</button>
  <button id="resetFilters">Reset</button>
</div>

<div id="filterbox">
  <input id="searchInput" placeholder="Zoek dataset, eigenaar…" />
  <span id="hitCount"></span>
  <div id="suggestions" class="suggestions"></div>
</div>



<main id="container">
 <div id="lineage"></div>

<div id="legend">
  <div><span class="legend dataset"></span> Dataset</div>
  <div><span class="legend job"></span> Verwerking</div>

  <div class="spacer"></div>

  <div><span class="legend medal goud"></span> Goud</div>
  <div><span class="legend medal zilver"></span> Zilver</div>
  <div><span class="legend medal brons"></span> Brons</div>
</div>

  <aside id="details">
    <h2>Details</h2>
    <div id="details-content"></div>
  </aside>
</main>

<script src="js/lineage.js"></script>

</body>
</html>
