<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Scriptmonitor – Databeheer</title>

<link rel="stylesheet" href="../css/style.css">

<style>

.dashboard {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:20px;
  margin-bottom:28px;
}

.card{
  background:#f7f9fb;
  border:1px solid #e0e0e0;
  border-left:6px solid var(--pnh-lightblue);
  padding:16px;
}

.card h3{
  margin:0 0 8px 0;
  font-size:15px;
  color:var(--pnh-darkblue);
}

.card .date{
  font-size:12px;
  color:#666;
  margin-top:4px;
}

.status{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:500;
}

.status-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
}

.status-success .status-dot{background:#2ca02c;}
.status-failed .status-dot{background:#d62728;}
.status-running .status-dot{background:#ffcc00;}

.status-success{color:#2ca02c;}
.status-failed{color:#d62728;}
.status-running{color:#b38f00;}

.updated{
  font-size:12px;
  color:#666;
  margin-top:12px;
}

</style>

</head>

<body>

<div id="top_bar"></div>

<div id="header_wrap">
  <div class="inner">
    <h1 id="project_title">Databeheer – Scriptmonitor</h1>
    <p id="project_tagline">Status van automatische dataprocessen</p>
  </div>
</div>

<div id="main_content_wrap">
  <div class="inner">

    <div class="content">

      <h2>Overzicht scripts</h2>

      <div class="dashboard" id="dashboard">
      </div>

      <p class="updated">
        Pagina geladen op <span id="loadtime"></span>
      </p>

      <h2>Detailoverzicht</h2>

      <table>
        <thead>
          <tr>
            <th>Naam script</th>
            <th>Uitgevoerd op</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="scriptTable">
        </tbody>
      </table>

    </div>

  </div>
</div>

<div id="footer_wrap">
  <div class="inner">
    Provincie Noord‑Holland – Databeheer
  </div>
</div>

<script>

const now = new Date();
document.getElementById("loadtime").textContent =
  now.toLocaleDateString("nl-NL") + " " +
  now.toLocaleTimeString("nl-NL");

fetch("status.json")
.then(response => response.json())
.then(data => {

  const table = document.getElementById("scriptTable");
  const dashboard = document.getElementById("dashboard");

  Object.entries(data.scripts).forEach(([name, info]) => {

    let statusClass = "";

    if (info.status === "success") {
        statusClass = "status-success";
    }
    else if (info.status === "failed") {
        statusClass = "status-failed";
    }
    else if (info.status === "running") {
        statusClass = "status-running";
    }

    // -------- tabelrij --------

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${name}</td>
      <td>${info.last_run}</td>
      <td class="status ${statusClass}">
        <span class="status-dot"></span>
        ${info.status}
      </td>
    `;

    table.appendChild(row);

    // -------- dashboard card --------

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${name}</h3>
      <div class="status ${statusClass}">
        <span class="status-dot"></span>
        ${info.status}
      </div>
      <div class="date">Uitgevoerd op: ${info.last_run}</div>
    `;

    dashboard.appendChild(card);

  });

});
</script>

</body>
</html>
